<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Egg Teaser | Coming Soon</title>
    <meta
      name="description"
      content="A rare golden anomaly is about to crack open on Tempo."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="teaser-shell">
      <header class="teaser-top">
        <div class="comic-stack">
          <div class="sticker sticker-title">BEHOLD!</div>
          <div class="sticker sticker-sub">A RARE ANOMALY</div>
        </div>
        <div class="sticker sticker-status">SYS: ONLINE // 99%</div>
      </header>

      <section class="hero-stage" aria-label="Egg teaser stage">
        <div class="sunburst" aria-hidden="true"></div>
        <div class="planet planet-left" aria-hidden="true"></div>
        <div class="planet planet-right" aria-hidden="true"></div>
        <div class="spark spark-a" aria-hidden="true"></div>
        <div class="spark spark-b" aria-hidden="true"></div>
        <div class="spark spark-c" aria-hidden="true"></div>
        <div class="spark spark-d" aria-hidden="true"></div>

        <div class="egg-aura" aria-hidden="true"></div>
        <div class="egg-core" aria-label="Golden Egg"></div>

        <div class="hero-copy">
          <p class="hero-line">A golden anomaly is about to crack open on <span>@tempo</span>.</p>
          <div class="hero-actions">
            <a class="hero-button hero-button-primary" href="/egg/index.html">Preview Egg Site</a>
            <a class="hero-button hero-button-secondary" href="/egg/docs/index.html">Read Docs</a>
          </div>
        </div>

        <aside class="scan-card">
          <div class="scan-top">ENTITY SCANNED</div>
          <p>An unidentified ovum emitting extreme hatch potential.</p>
          <div class="scan-row">
            <span>Density</span>
            <strong>MAXIMUM</strong>
          </div>
          <div class="scan-row">
            <span>Vibe</span>
            <strong>UNHINGED</strong>
          </div>
        </aside>

        <div class="launch-card">
          <span>13,200 Egg</span>
          <strong>COMING SOON</strong>
        </div>
      </section>
    </main>
  </body>
</html>
